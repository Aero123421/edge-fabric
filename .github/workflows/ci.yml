name: ci

on:
  push:
  pull_request:

jobs:
  python-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Doctor
        run: python scripts/doctor.py
      - name: Python local router demo
        run: python scripts/demo_local_router.py
      - name: Unit tests
        run: python -m unittest discover -s tests -v
  go-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
      - name: Doctor (Go strict)
        run: python scripts/doctor.py --require-go
      - name: Go tests
        run: go test ./...
      - name: Go command builds
        run: go build ./cmd/...
      - name: Sleepy cycle demo
        run: go run ./cmd/sleepy-cycle-demo
  firmware-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - firmware/esp-idf/gateway-head
          - firmware/esp-idf/node-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: "v5.2.6"
      - name: Doctor (IDF strict)
        run: python scripts/doctor.py --require-idf
      - name: Build firmware app
        working-directory: ${{ matrix.app }}
        run: |
          idf.py set-target esp32s3
          idf.py build

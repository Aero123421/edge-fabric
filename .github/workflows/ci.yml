name: ci

on:
  push:
  pull_request:

jobs:
  python-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install -e .
      - name: Doctor
        run: python scripts/doctor.py
      - name: Python local router demo
        run: python scripts/demo_local_router.py
      - name: Unit tests
        run: python -m unittest discover -s tests -v
  go-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - name: Go tests
        run: go test ./...
      - name: Go command builds
        run: go build ./cmd/...
      - name: Sleepy cycle demo
        run: go run ./cmd/sleepy-cycle-demo
